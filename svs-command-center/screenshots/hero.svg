<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" role="img" aria-label="Studio Command Center — single-file, offline-first, encrypted studio operations dashboard">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#241a12"/><stop offset="0.55" stop-color="#1a130d"/><stop offset="1" stop-color="#0f0b07"/>
  </linearGradient>
  <radialGradient id="glow" cx="0.28" cy="0.3" r="0.7">
    <stop offset="0" stop-color="#7a5a2e" stop-opacity="0.55"/><stop offset="1" stop-color="#7a5a2e" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f4e3b0"/><stop offset="0.5" stop-color="#cda454"/><stop offset="1" stop-color="#9c7530"/>
  </linearGradient>
  <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#2c2118"/><stop offset="1" stop-color="#211812"/>
  </linearGradient>
</defs>

<rect width="1200" height="430" fill="url(#bg)"/>
<rect width="1200" height="430" fill="url(#glow)"/>
<rect x="8" y="8" width="1184" height="414" rx="16" fill="none" stroke="#b08d57" stroke-opacity="0.35"/>

<!-- LEFT: copy -->
<g transform="translate(60,74)">
  <text x="0" y="0" font-size="13" letter-spacing="4" fill="#cda454" font-weight="600">OFFLINE · SINGLE FILE · ENCRYPTED</text>
  <text x="-2" y="62" font-size="54" font-weight="700" fill="#f5efe3" font-family="Georgia,'Times New Roman',serif">Studio Command</text>
  <text x="-2" y="118" font-size="54" font-weight="700" fill="url(#gold)" font-family="Georgia,'Times New Roman',serif">Center</text>
  <text x="0" y="162" font-size="17" fill="#c7bba8">A full studio ERP — pipeline, money, scheduling &amp; delivery —</text>
  <text x="0" y="187" font-size="17" fill="#c7bba8">in one self-contained HTML file. No server. No accounts.</text>

  <!-- feature pills -->
  <g font-size="13" font-weight="600">
    <g transform="translate(0,225)">
      <rect x="0" y="0" width="132" height="34" rx="17" fill="#2c2118" stroke="#b08d57" stroke-opacity="0.5"/>
      <text x="66" y="22" text-anchor="middle" fill="#e9dcc2">0 dependencies</text>
    </g>
    <g transform="translate(144,225)">
      <rect x="0" y="0" width="120" height="34" rx="17" fill="#2c2118" stroke="#b08d57" stroke-opacity="0.5"/>
      <text x="60" y="22" text-anchor="middle" fill="#e9dcc2">Vanilla JS</text>
    </g>
    <g transform="translate(276,225)">
      <rect x="0" y="0" width="156" height="34" rx="17" fill="#2c2118" stroke="#b08d57" stroke-opacity="0.5"/>
      <text x="78" y="22" text-anchor="middle" fill="#e9dcc2">AES-GCM encrypted</text>
    </g>
    <g transform="translate(0,269)">
      <rect x="0" y="0" width="150" height="34" rx="17" fill="#2c2118" stroke="#b08d57" stroke-opacity="0.5"/>
      <text x="75" y="22" text-anchor="middle" fill="#e9dcc2">Works fully offline</text>
    </g>
    <g transform="translate(162,269)">
      <rect x="0" y="0" width="140" height="34" rx="17" fill="#2c2118" stroke="#b08d57" stroke-opacity="0.5"/>
      <text x="70" y="22" text-anchor="middle" fill="#e9dcc2">Phone &amp; desktop</text>
    </g>
  </g>
</g>

<!-- RIGHT: stylised dashboard window -->
<g transform="translate(700,58)">
  <rect x="0" y="0" width="440" height="314" rx="14" fill="url(#card)" stroke="#b08d57" stroke-opacity="0.45"/>
  <!-- title bar -->
  <rect x="0" y="0" width="440" height="34" rx="14" fill="#33271b"/>
  <rect x="0" y="20" width="440" height="14" fill="#33271b"/>
  <circle cx="22" cy="17" r="5" fill="#c85a54"/><circle cx="40" cy="17" r="5" fill="#d9a441"/><circle cx="58" cy="17" r="5" fill="#5aa06a"/>
  <text x="220" y="21" text-anchor="middle" font-size="11" letter-spacing="2" fill="#cbb790">STUDIO — COMMAND CENTER</text>

  <!-- KPI cards -->
  <g>
    <rect x="18" y="50" width="126" height="66" rx="9" fill="#241a12" stroke="#4a3826"/>
    <text x="30" y="72" font-size="10" fill="#a58c6a">THIS MONTH</text>
    <text x="30" y="98" font-size="22" font-weight="700" fill="url(#gold)">GHS 18.4k</text>
    <rect x="157" y="50" width="126" height="66" rx="9" fill="#241a12" stroke="#4a3826"/>
    <text x="169" y="72" font-size="10" fill="#a58c6a">PIPELINE</text>
    <text x="169" y="98" font-size="22" font-weight="700" fill="#eadcbf">6 active</text>
    <rect x="296" y="50" width="126" height="66" rx="9" fill="#241a12" stroke="#4a3826"/>
    <text x="308" y="72" font-size="10" fill="#a58c6a">SUBS</text>
    <text x="308" y="98" font-size="22" font-weight="700" fill="#eadcbf">4 / 8</text>
  </g>

  <!-- mini bar chart -->
  <g transform="translate(18,132)">
    <text x="0" y="0" font-size="10" fill="#a58c6a">REVENUE VS MILESTONE</text>
    <g>
      <rect x="0" y="16" width="26" height="60" rx="3" fill="#3b2c1c"/><rect x="0" y="46" width="26" height="30" rx="3" fill="url(#gold)"/>
      <rect x="38" y="16" width="26" height="60" rx="3" fill="#3b2c1c"/><rect x="38" y="34" width="26" height="42" rx="3" fill="url(#gold)"/>
      <rect x="76" y="16" width="26" height="60" rx="3" fill="#3b2c1c"/><rect x="76" y="26" width="26" height="50" rx="3" fill="url(#gold)"/>
      <rect x="114" y="16" width="26" height="60" rx="3" fill="#3b2c1c"/><rect x="114" y="40" width="26" height="36" rx="3" fill="url(#gold)"/>
      <rect x="152" y="16" width="26" height="60" rx="3" fill="#3b2c1c"/><rect x="152" y="22" width="26" height="54" rx="3" fill="url(#gold)"/>
    </g>
  </g>

  <!-- pipeline list -->
  <g transform="translate(214,132)" font-size="11">
    <text x="0" y="0" font-size="10" fill="#a58c6a">PIPELINE</text>
    <g transform="translate(0,14)">
      <rect x="0" y="0" width="208" height="24" rx="6" fill="#241a12" stroke="#3a2b1c"/>
      <text x="10" y="16" fill="#e2d4ba">Ama &amp; Kwesi · Wedding</text>
      <rect x="150" y="5" width="52" height="14" rx="7" fill="#274b34"/><text x="176" y="15" text-anchor="middle" font-size="8.5" fill="#8fd6a6">BOOKED</text>
    </g>
    <g transform="translate(0,42)">
      <rect x="0" y="0" width="208" height="24" rx="6" fill="#241a12" stroke="#3a2b1c"/>
      <text x="10" y="16" fill="#e2d4ba">Delta Corp · Headshots</text>
      <rect x="140" y="5" width="62" height="14" rx="7" fill="#2b3a52"/><text x="171" y="15" text-anchor="middle" font-size="8.5" fill="#9dc0ea">DELIVERED</text>
    </g>
    <g transform="translate(0,70)">
      <rect x="0" y="0" width="208" height="24" rx="6" fill="#241a12" stroke="#3a2b1c"/>
      <text x="10" y="16" fill="#e2d4ba">Serwaa · 30th Birthday</text>
      <rect x="150" y="5" width="52" height="14" rx="7" fill="#274b34"/><text x="176" y="15" text-anchor="middle" font-size="8.5" fill="#8fd6a6">BOOKED</text>
    </g>
  </g>

  <!-- lock chip -->
  <g transform="translate(18,270)">
    <rect x="0" y="0" width="404" height="28" rx="8" fill="#1c140d" stroke="#3a2b1c"/>
    <g transform="translate(12,9)"><rect x="0" y="4" width="11" height="8" rx="1.5" fill="#cda454"/><path d="M2 4 V2.5 a3.5 3.5 0 0 1 7 0 V4" fill="none" stroke="#cda454" stroke-width="1.4"/></g>
    <text x="30" y="19" font-size="11" fill="#a58c6a">Encrypted on-device · auto-locks on inactivity</text>
  </g>
</g>
</svg>
